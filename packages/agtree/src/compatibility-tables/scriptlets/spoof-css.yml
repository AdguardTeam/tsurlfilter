common:
  description: Spoof CSS property value when getComputedStyle() or getBoundingClientRect() methods is called.

adg_os_any|adg_ext_any|adg_safari_any:
  name: spoof-css
  version_added: 1.10.1
  aliases:
    - spoof-css.js
    - ubo-spoof-css.js
    - ubo-spoof-css
  docs: https://github.com/AdguardTeam/Scriptlets/blob/master/wiki/about-scriptlets.md#spoof-css
  parameters:
    - name: selectors
      required: true
      description: String of comma-separated selectors to match.
    - name: cssPropertyName
      required: true
      description: CSS property name.
    - name: cssPropertyValue
      required: true
      description: CSS property value.

ubo_any:
  name: spoof-css.js
  aliases:
    - spoof-css
  docs: https://github.com/gorhill/uBlock/wiki/Resources-Library#spoof-cssjs-
  parameters:
    - name: selector
      required: true
      description: A CSS selector for the element(s) to target.
  variadic_parameters:
    min_count: 2
    max_count: null
    all_parameters:
      name: property-value pairs
      description: A list of property-value pairs of the style properties to spoof to the specified values.
