common:
  description: Closes the browser tab immediately.
  parameters:
    - name: path
      required: false
      description: String or regular expression matching the current location's path (window.location.pathname + window.location.search). Defaults to execute on every page.

adg_os_any|adg_ext_any|adg_safari_any:
  name: close-window
  version_added: 1.5.0
  aliases:
    - window-close-if.js
    - ubo-window-close-if.js
    - ubo-window-close-if
    - close-window.js
    - ubo-close-window.js
    - ubo-close-window
  docs: https://github.com/AdguardTeam/Scriptlets/blob/master/wiki/about-scriptlets.md#close-window

ubo_any:
  name: close-window.js
  version_added: 1.39.3b10
  aliases:
