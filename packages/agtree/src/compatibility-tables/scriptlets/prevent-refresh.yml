common:
  description: Prevents reloading of a document through a meta "refresh" tag.
  parameters:
    - name: delay
      required: false
      description: Number of seconds for delay that indicates when scriptlet should run. If not set, source tag value will be applied.

adg_os_any|adg_ext_any|adg_safari_any:
  name: prevent-refresh
  version_added: 1.6.2
  aliases:
    - prevent-refresh.js
    - refresh-defuser.js
    - refresh-defuser
    - ubo-prevent-refresh.js
    - ubo-prevent-refresh
    - ubo-refresh-defuser.js
    - ubo-refresh-defuser
  docs: https://github.com/AdguardTeam/Scriptlets/blob/master/wiki/about-scriptlets.md#prevent-refresh

ubo_any:
  name: prevent-refresh.js
  version_added: 1.38.7b3
  aliases:
    - refresh-defuser.js
    - prevent-refresh
    - refresh-defuser
  docs: https://github.com/gorhill/uBlock/wiki/Resources-Library#prevent-refreshjs-
