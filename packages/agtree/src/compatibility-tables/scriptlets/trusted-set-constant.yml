common:
  description: Creates a constant property and assigns it a specified value.
  is_trusted: true
  parameters:
    - name: property
      required: true
      description: Path to a property (joined with . if needed). The property must be attached to window.
    - name: value
      required: true
      description: An arbitrary value to be set; value type is being inferred from the argument.
    - name: stack
      required: false
      description: String or regular expression that must match the current function call stack trace; if regular expression is invalid it will be skipped.

adg_os_any|adg_ext_any|adg_safari_any:
  name: trusted-set-constant
  version_added: 1.8.2

ubo_any:
  name: trusted-set-constant.js
  aliases:
    - trusted-set
    - trusted-set.js
    - trusted-set-constant
  is_trusted: true
  parameters:
    - name: chain
      required: true
      description: Property (chain of properties joined by `.`) attached to `window` object.
    - name: rawValue
      required: true
      description: The value to set. Any value is accepted since this is a trusted scriptlet.
  ubo_tokens:
    - name: runAt
      description: Defers the constant installation to a specific document ready state. Values correspond to `readyState`.
      value_format: ^(loading|asap|interactive|end|2|complete|idle|3)$
      value_type: string
    - name: as
      description: Wraps the constant value. `function` returns `() => value`, `callback` returns `() => () => value`, `resolved` returns `Promise.resolve(value)`, `rejected` returns `Promise.reject(value)`.
      value_format: ^(function|callback|resolved|rejected)$
      value_type: string
