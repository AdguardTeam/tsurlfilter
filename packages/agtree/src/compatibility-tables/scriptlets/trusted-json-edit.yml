ubo_any:
  name: trusted-json-edit.js
  version_added: 1.69.1b4
  description: Edit object generated through `JSON.parse()`. Properties can be assigned new values.
  aliases:
    - trusted-json-edit
  docs: https://github.com/gorhill/uBlock/blob/a85fc33ce8ba8de5ae8f400cc6473243803deae6/src/js/resources/json-edit.js#L152
  is_trusted: true
  parameters:
    - name: jsonq
      required: false
      description: "A JSONPath query string that selects which properties to act on within the object. Uses dot-separated paths (e.g. `foo.bar`), `[]` for array items, and a `!` prefix on a path segment to delete it. Note: this is uBO's own JSONPath dialect, not the standard spec."
      default: ''
