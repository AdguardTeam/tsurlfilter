---
version: 2
plan:
  project-key: AJL
  key: CSSTOKENIZERTEST
  name: CSS Tokenizer - tests
variables:
  dockerContainer: adguard/node-ssh:18.19--0

stages:
  - Test:
      manual: false
      final: false
      jobs:
        - Test

Test:
  key: TEST
  docker:
    image: "${bamboo.dockerContainer}"
    volumes:
       ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: 'true'
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            ls -alt

            # Set cache directory
            pnpm config set store-dir ${bamboo.cachePnpm}

            # Run NX CLI to find projects changed since the master branch and check if the specified project is affected.
            # And store grep exit status to determine if the project was found (0) or not (1).
            is_affected=$(pnpm dlx nx show projects --affected --select=projects --base=master --head=HEAD | grep -q "@adguard/css-tokenizer" && echo true || echo false)

            branch="${bamboo.planRepository.branchName}"

            # If not on 'master' and the project is not affected, skip tests for it.
            if [ "$branch" != "master" ] && [ "$is_affected" = false ]; then
              echo "No changes in project, skipping tests"
              exit 0;
            fi

            pnpm install

            # Check TypeScript types with TSC
            pnpm --filter @adguard/css-tokenizer check-types

            # ESLint & Markdownlint
            pnpm --filter @adguard/css-tokenizer lint

            # Run tests with Jest
            pnpm --filter @adguard/css-tokenizer test
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            ls -la

            echo "Size before cleanup:" && du -h | tail -n 1

            # Assign a boolean-like value based on whether 'pnpm list' outputs something
            packages_installed=$(pnpm list | grep -q '.' && echo "true" || echo "false")

            if [ "$packages_installed" = "true" ]; then
              pnpm clean
              echo "Size after cleanup:" && du -h | tail -n 1
            else
              echo "node_modules not installed, skipping cleanup."
            fi
  requirements:
    - adg-docker: 'true'

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: 'true'

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo

labels: [ ]

other:
  concurrent-build-plugin: system-default
