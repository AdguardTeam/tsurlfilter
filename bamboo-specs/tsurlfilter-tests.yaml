---
version: 2
plan:
  project-key: AJL
  key: TSURLFILTERTEST
  name: tsurlfilter - tests
variables:
  dockerContainer: adguard/node-ssh:22.14--0
  testTimeout: 180s

# Some packages are independent of each other
# so we can run them in parallel at first stage, i.e. logger and css-tokenizer.
#
# Next stages are about single package tests since they depend on each other:
# - AGTree
# - TSUrlFilter
# - TSWebExtension and DNR-Rulesets — can be run in parallel.
#
# After that, we have a stage for example packages, benchmarks, and docs update.
# They can be run in parallel.
#
# Finally, we have a stage for cleanup.

stages:
  - Independent packages:
      manual: false
      final: false
      jobs:
        - TestLogger
        - TestCssTokenizer
  - AGTree, CSS Tokenizer benchmarks:
      manual: false
      final: false
      jobs:
        - TestAgTree
        # add non-relevant to agtree job to run in parallel
        - TestBenchmarkCssTokenizer
  - TSUrlFilter, AGTree benchmarks:
      manual: false
      final: false
      jobs:
        - TestTSUrlFilter
        # add non-relevant to tsurlfilter job to run in parallel
        - TestBenchmarkAGTree
        - TestBenchmarkAGTreeBrowser
  - TSWebExtension, DNR-Rulesets, Update TSUrlFilter Docs MV3:
      manual: false
      final: false
      jobs:
        - TestTSWebExtension
        - TestDNRRulesets
        # add non-relevant to tswebextension and dnr-rulesets job to run in parallel
        - UpdateTSUrlFilterDocsMV3
  - Example APIs, TSWebExtensions:
      manual: false
      final: false
      jobs:
        - TestExamplesApis
        - TestExamplesTSWebExtensions
  - Cleanup:
      manual: false
      final: true
      jobs:
        - Cleanup

# NOTE: Each script is separate because, otherwise, Bamboo does not fail in the case of an error.

TestLogger:
  key: TESTLOGGER
  docker: &docker
    image: "${bamboo.dockerContainer}"
    volumes:
       ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - script: &setup-script
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/setup-tests.sh"
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/logger-tests.sh"
  requirements: &requirements
    - adg-docker: 'true'
    - extension: 'true'

TestCssTokenizer:
  key: TESTCSSTOKENIZER
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/css-tokenizer-tests.sh"
  requirements: *requirements

TestAgTree:
  key: TESTAGTREE
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/agtree-tests.sh"
  requirements: *requirements

TestTSUrlFilter:
  key: TESTTSURLFILTER
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/tsurlfilter-tests.sh"
  requirements: *requirements

TestTSWebExtension:
  key: TESTTSWEBEXTENSION
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/tswebextension-tests.sh"
  requirements: *requirements

TestDNRRulesets:
  key: TESTDNRRULESETS
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/dnr-rulesets-tests.sh"
  requirements: *requirements

TestExamplesTSWebExtensions:
  key: TESTEXAMPLESTSWEBEXTENSIONS
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/examples-tswebextension-mv2-tests.sh"
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/examples-tswebextension-mv3-tests.sh"
  requirements: *requirements

TestExamplesApis:
  key: TESTEXAMPLESAPIS
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/examples-adguard-api-tests.sh"
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/examples-adguard-api-mv3-tests.sh"
  artifacts:
    - name: examples-adguard-api-extension.zip
      location: packages/examples/adguard-api/build
      pattern: extension.zip
      shared: false
      required: false
    - name: examples-adguard-api-mv3-extension.zip
      location: packages/examples/adguard-api-mv3/build
      pattern: extension.zip
      shared: false
      required: false
  requirements: *requirements

TestBenchmarkCssTokenizer:
  key: TESTBENCHMARKCSSTOKENIZER
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/benchmarks-css-tokenizer-benchmark-tests.sh"
  requirements: *requirements

TestBenchmarkAGTree:
  key: TESTBENCHMARKAGTREE
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/benchmarks-agtree-benchmark-tests.sh"
  requirements: *requirements

TestBenchmarkAGTreeBrowser:
  key: TESTBENCHMARKAGTREEBROWSER
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/benchmarks-agtree-browser-benchmark-tests.sh"
  requirements: *requirements

UpdateTSUrlFilterDocsMV3:
  key: UPDTSURLFILTERDOCSMV3
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script: *setup-script
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/timeout-wrapper.sh ${bamboo.testTimeout} ./bamboo-specs/scripts/tsurlfilter-update-docs-mv3.sh"
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.commit
        configuration:
          commitMessage: 'skipci: Automatic update tsurlfilter MV3 docs'
          selectedRepository: defaultRepository
  requirements: *requirements

Cleanup:
  key: CLEAN
  docker: *docker
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            ls -la

            echo "Size before cleanup:" && du -h | tail -n 1

            du -h . | sort -hr | head -n 30

            # Check if node_modules directory exists
            if [ -d "node_modules" ]; then
              # to run clean commands in the packages
              pnpm -r clean

              # to remove node_modules
              pnpm clean
            else
              echo "node_modules directory does not exist, skipping pnpm clean"
            fi

            echo "Size after cleanup:" && du -h | tail -n 1
  requirements: *requirements

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: true

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo

labels: [ ]

other:
  concurrent-build-plugin: system-default
